{% set name = "ngff_zarr" %}
{% set version = "0.37.0" %}

package:
  name: {{ name }}
  version: "{{ version }}"

source:
  url: https://pypi.org/packages/source/n/ngff_zarr/ngff_zarr-{{ version }}.tar.gz
  sha256: d006f1a0960745107ef4beba89410494cc18903b106dc05e0ab43e4f3270c6c4


build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - ngff-zarr = ngff_zarr.cli:main


requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
  run:
    - python >={{ python_min }}
    - numpy >=1.21
    - zarr >=2.13
    - numcodecs >=0.10
    - dask-core
    - importlib_resources
    - typing_extensions
    - platformdirs
    - psutil
    - rich
    - rich-argparse
    - itkwasm
    - itkwasm-downsample

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - ngff_zarr
  commands:
    - pip check

about:
  summary: "NGFF Zarr: Multiscale bioimaging data in Zarr format"
  home: https://github.com/fideus-labs/ngff-zarr
  doc_url: https://ngff-zarr.readthedocs.io/
  license: MIT
  license_file: LICENSE.txt



extra:
  recipe-maintainers:
    - khaled196
    - thewtex
